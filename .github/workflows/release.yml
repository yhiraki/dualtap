name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version from tag
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          printf '// Version.swift — release version. build.sh and CI stamp this from the git tag at build time.\nlet version = "%s"\n' "$V" > Sources/dualtap/Version.swift
      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64
      - name: Package
        run: |
          set -euo pipefail
          BINDIR=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          codesign --force --sign - "$BINDIR/dualtap"
          TARBALL="dualtap-${GITHUB_REF_NAME}-macos-universal.tar.gz"
          tar -czf "$TARBALL" -C "$BINDIR" dualtap
          shasum -a 256 "$TARBALL"
      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          # Print the body between "## [V]" and the next "## [" heading.
          awk -v v="$V" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > notes.md
          cat notes.md
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_ARGS=(--generate-notes)
          [ -s notes.md ] && NOTES_ARGS=(--notes-file notes.md --generate-notes)
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" "${NOTES_ARGS[@]}"
          gh release upload "$GITHUB_REF_NAME" \
            "dualtap-${GITHUB_REF_NAME}-macos-universal.tar.gz" --clobber
      - name: Bump Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping Homebrew formula bump" >&2
            exit 0
          fi
          TARBALL="dualtap-${GITHUB_REF_NAME}-macos-universal.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          URL="https://github.com/yhiraki/dualtap/releases/download/${GITHUB_REF_NAME}/${TARBALL}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/yhiraki/homebrew-tap.git" tap
          F=tap/Formula/dualtap.rb
          sed -E -e "s|^(  url ).*|\1\"${URL}\"|" \
                 -e "s|^(  sha256 ).*|\1\"${SHA}\"|" "$F" > "$F.tmp"
          mv "$F.tmp" "$F"
          cd tap
          if git diff --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "dualtap ${GITHUB_REF_NAME#v}"
          git push
